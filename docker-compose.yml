services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 3001
      SQLITE_PATH: /data/app.db
      ENABLE_INLINE_WORKER: "true"
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - /app/node_modules
      - sqlite_data:/data
    command: npm run dev

volumes:
  sqlite_data:
